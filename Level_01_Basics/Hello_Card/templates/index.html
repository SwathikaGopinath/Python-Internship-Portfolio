<!DOCTYPE html>
<html>

<head>

    <title>Hello Card</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="card">

        <h1>Hello Card</h1>

        <form method="POST">

            <input
                type="text"
                name="name"
                placeholder="Enter your name"
                required>

            <input
                type="number"
                name="age"
                placeholder="Enter your age"
                required>

            <button type="submit">

                Generate Card

            </button>

        </form>

        {% if message %}

            <div class="result">

                {{ message }}

            </div>

        {% endif %}

    </div>

</body>

</html>
