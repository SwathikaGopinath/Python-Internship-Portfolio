<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Simple Calculator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <h1>🧮 Simple Calculator</h1>

    <p class="subtitle">
        Perform basic arithmetic operations using Python & Flask
    </p>

    <form method="POST">

        <label>Number 1</label>

        <input
            type="number"
            name="num1"
            placeholder="Enter First Number"
            required>

        <label>Number 2</label>

        <input
            type="number"
            name="num2"
            placeholder="Enter Second Number"
            required>

        <button type="submit">

            Calculate

        </button>

    </form>

    {% if results %}

    <div class="results">

        <h2>Results</h2>

        <div class="cards">

            {% for operation, answer in results.items() %}

            <div class="card">

                <h3>{{ operation }}</h3>

                <p>{{ answer }}</p>

            </div>

            {% endfor %}

        </div>

    </div>

    {% endif %}

</div>

</body>

</html>
